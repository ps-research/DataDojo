# DataDojo edge: serves the built SPA, proxies /api to the Node app, and keeps
# SSE streaming unbuffered. certbot rewrites/augments the TLS bits in place.
server {
    listen 80;
    server_name datadojo.duckdns.org;

    root /root/DataDojo/app/web/dist;
    index index.html;

    # API -> Node
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE verdict stream: no buffering, long read timeout
    location ~ ^/api/submissions/.+/stream$ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 1m;
    gzip on;
    gzip_types text/css application/javascript application/json;
}
